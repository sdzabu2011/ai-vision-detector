<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="AI Vision Live Detector — Google Gemini bilan BEPUL jonli obyekt aniqlash" />
  <meta name="theme-color" content="#060c1a" />
  <title>AI Vision Detector — BEPUL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- ═══ SVG SPRITE ═══ -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="ic-cam" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </symbol>
    <symbol id="ic-stop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="6" width="12" height="12" rx="1"/>
    </symbol>
    <symbol id="ic-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>
    <symbol id="ic-target" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
    </symbol>
    <symbol id="ic-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/>
    </symbol>
    <symbol id="ic-term" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="18" rx="2"/>
      <polyline points="7 8 10.5 11.5 7 15"/><line x1="14" y1="15" x2="17" y2="15"/>
    </symbol>
    <symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </symbol>
    <symbol id="ic-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </symbol>
    <symbol id="ic-box" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
    </symbol>
    <symbol id="ic-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
    </symbol>
    <symbol id="ic-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <polyline points="9 12 11 14 15 10"/>
    </symbol>
    <symbol id="ic-rect" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></symbol>
    <symbol id="ic-circ" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></symbol>
    <symbol id="ic-tri" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 22 2 22"/></symbol>
    <symbol id="ic-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h7a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="ic-gift" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/>
      <line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
    </symbol>
  </svg>

  <!-- ═══ BACKGROUND ═══ -->
  <div class="bg-fx" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--g"></div>
    <div class="bg-orb bg-orb--b"></div>
    <div class="bg-orb bg-orb--p"></div>
    <div id="particleBox"></div>
  </div>

  <!-- ═══ 3D SHAPES ═══ -->
  <div class="scene3d" aria-hidden="true">
    <div class="s3-cube s3-cube--a">
      <div class="s3-face s3-front"></div><div class="s3-face s3-back"></div>
      <div class="s3-face s3-right"></div><div class="s3-face s3-left"></div>
      <div class="s3-face s3-top"></div><div class="s3-face s3-bottom"></div>
    </div>
    <div class="s3-cube s3-cube--b">
      <div class="s3-face s3-front"></div><div class="s3-face s3-back"></div>
      <div class="s3-face s3-right"></div><div class="s3-face s3-left"></div>
      <div class="s3-face s3-top"></div><div class="s3-face s3-bottom"></div>
    </div>
    <div class="s3-ring s3-ring--a"></div>
    <div class="s3-ring s3-ring--b"></div>
    <div class="s3-diamond"></div>
  </div>

  <!-- ═══ APP ═══ -->
  <div class="app">

    <!-- HEADER -->
    <header class="header gcard">
      <div class="header__l">
        <div class="logo3d" aria-hidden="true">
          <div class="logo3d__f logo3d__front"></div>
          <div class="logo3d__f logo3d__back"></div>
          <div class="logo3d__f logo3d__right"></div>
          <div class="logo3d__f logo3d__left"></div>
          <div class="logo3d__f logo3d__top"></div>
          <div class="logo3d__f logo3d__bottom"></div>
          <div class="logo3d__core"></div>
        </div>
        <div>
          <h1 class="hdr-title">AI VISION DETECTOR</h1>
          <p class="hdr-sub">
            Google Gemini Vision — BEPUL jonli aniqlash
            <svg class="icon icon--xs" style="color:var(--c-accent);vertical-align:middle;margin-left:4px"><use href="#ic-gift"/></svg>
          </p>
        </div>
      </div>
      <div class="header__r">
        <div class="keybox">
          <svg class="icon icon--sm"><use href="#ic-key"/></svg>
          <input type="password" id="apiKeyInput" class="keybox__input" placeholder="Gemini API kaliti..." autocomplete="off" spellcheck="false" />
          <span class="keybox__tag" id="keyTag"></span>
        </div>
        <div class="inds">
          <div class="ind" id="indCam">
            <span class="ind__dot"></span>
            <span class="ind__txt">Kamera</span>
          </div>
          <div class="ind" id="indLive">
            <span class="ind__dot"></span>
            <span class="ind__txt">Kutish</span>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">

      <!-- LEFT -->
      <section class="col-v">
        <div class="vidbox gcard tilt" id="vidbox">
          <video id="vid" autoplay playsinline muted></video>
          <canvas id="cvs"></canvas>
          <div class="scanbar" id="scanbar"></div>
          <div class="brk brk--tl"></div><div class="brk brk--tr"></div>
          <div class="brk brk--bl"></div><div class="brk brk--br"></div>
          <div class="ph" id="ph">
            <div class="ph__vis">
              <div class="ph__ring"></div>
              <div class="ph__ring ph__ring--2"></div>
              <div class="ph__ring ph__ring--3"></div>
              <svg class="ph__icon"><use href="#ic-cam"/></svg>
            </div>
            <p class="ph__t1">Kamera tayyor</p>
            <p class="ph__t2">Quyidagi tugmani bosib kamerani yoqing</p>
          </div>
        </div>

        <!-- Controls -->
        <div class="ctrls gcard">
          <button class="btn btn--on" id="btnOn">
            <svg class="icon"><use href="#ic-cam"/></svg>
            <span>Kamerani yoqish</span>
          </button>
          <button class="btn btn--off" id="btnOff" disabled>
            <svg class="icon"><use href="#ic-stop"/></svg>
            <span>O'chirish</span>
          </button>
          <span class="ctrls__sep"></span>
          <button class="btn btn--live" id="btnLive" disabled>
            <span class="rdot"></span>
            <span class="btn__lbl">Jonli aniqlash</span>
          </button>
          <span class="ctrls__sep"></span>
          <div class="ipick">
            <svg class="icon icon--sm"><use href="#ic-clock"/></svg>
            <div class="ipick__btns" id="ipickBtns">
              <button class="ipk" data-ms="1500">1.5s</button>
              <button class="ipk active" data-ms="2500">2.5s</button>
              <button class="ipk" data-ms="4000">4s</button>
              <button class="ipk" data-ms="6000">6s</button>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT -->
      <aside class="col-s">

        <!-- Objects -->
        <div class="pnl gcard tilt" id="pnlObj">
          <div class="pnl__h">
            <div class="pnl__name"><svg class="icon"><use href="#ic-target"/></svg><span>ANIQLANGAN OBYEKTLAR</span></div>
            <span class="badge" id="objBadge">0</span>
          </div>
          <div class="pnl__b pnl__b--scroll" id="objList">
            <div class="empty" id="objEmpty">
              <svg class="empty__ic"><use href="#ic-eye"/></svg>
              <p>Hali obyektlar aniqlanmadi</p>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="pnl gcard tilt">
          <div class="pnl__h">
            <div class="pnl__name"><svg class="icon"><use href="#ic-chart"/></svg><span>STATISTIKA</span></div>
          </div>
          <div class="sgrid">
            <div class="sc"><svg class="sc__bg"><use href="#ic-zap"/></svg><div class="sc__v" id="sF">0</div><div class="sc__l">Jami kadrlar</div></div>
            <div class="sc"><svg class="sc__bg"><use href="#ic-box"/></svg><div class="sc__v" id="sO">0</div><div class="sc__l">Obyektlar</div></div>
            <div class="sc"><svg class="sc__bg"><use href="#ic-clock"/></svg><div class="sc__v" id="sL">&mdash;</div><div class="sc__l">API (ms)</div></div>
            <div class="sc"><svg class="sc__bg"><use href="#ic-chart"/></svg><div class="sc__v" id="sA">0</div><div class="sc__l">Tahlil/daq</div></div>
          </div>
        </div>

        <!-- Log -->
        <div class="pnl gcard tilt" id="pnlLog">
          <div class="pnl__h">
            <div class="pnl__name"><svg class="icon"><use href="#ic-term"/></svg><span>TIZIM JURNALI</span></div>
          </div>
          <div class="pnl__b pnl__b--scroll pnl__b--mono" id="logBox"></div>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
