<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AI Vision Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#020510;--card:rgba(8,14,30,.85);--a:#00ff88;--ar:0,255,136;--b:#00b4ff;--d:#ff3860;--dr:255,56,96;--w:#ffb020;--t1:#eef0f4;--t2:#8892a6;--t3:#4a5568;--brd:rgba(255,255,255,.06);--r:14px;--rs:10px;--ff:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;border:none;background:none;color:inherit;outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(var(--ar),.2);border-radius:8px}

.gc{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--brd);border-radius:var(--r);position:relative;transition:border-color .3s}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ar),.2),transparent);pointer-events:none;border-radius:var(--r) var(--r) 0 0}
.gc:hover{border-color:rgba(var(--ar),.15)}

/* BG */
.bgfx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bgg{position:absolute;inset:-50%;width:200%;height:200%;background-image:linear-gradient(rgba(var(--ar),.018) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--ar),.018) 1px,transparent 1px);background-size:70px 70px;transform:perspective(600px) rotateX(35deg);transform-origin:center 60%;animation:gm 60s linear infinite}
@keyframes gm{to{background-position:0 70px}}
.orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.06}
.o1{width:500px;height:500px;background:var(--a);top:-180px;right:-120px;animation:od1 25s ease-in-out infinite}
.o2{width:400px;height:400px;background:var(--b);bottom:-120px;left:-80px;animation:od2 30s ease-in-out infinite}
@keyframes od1{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,60px) scale(1.1)}}
@keyframes od2{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-50px) scale(1.1)}}
.pt{position:absolute;width:2px;height:2px;background:var(--a);border-radius:50%;opacity:0;animation:pu linear infinite}
@keyframes pu{0%{opacity:0;transform:translateY(100vh)}8%{opacity:.4}90%{opacity:.4}100%{opacity:0;transform:translateY(-5vh)}}

/* 3D */
.s3{position:fixed;inset:0;pointer-events:none;z-index:0;perspective:800px}
.cb{position:absolute;transform-style:preserve-3d;width:60px;height:60px;top:12%;right:6%;animation:cr 20s linear infinite}
.cbf{position:absolute;width:100%;height:100%;border:1px solid rgba(var(--ar),.05)}
.cbf:nth-child(1){transform:translateZ(30px)}.cbf:nth-child(2){transform:rotateY(180deg) translateZ(30px)}.cbf:nth-child(3){transform:rotateY(90deg) translateZ(30px)}.cbf:nth-child(4){transform:rotateY(-90deg) translateZ(30px)}.cbf:nth-child(5){transform:rotateX(90deg) translateZ(30px)}.cbf:nth-child(6){transform:rotateX(-90deg) translateZ(30px)}
@keyframes cr{0%{transform:rotateX(-15deg) rotateY(0)}100%{transform:rotateX(-15deg) rotateY(360deg)}}

/* Layout */
.app{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column;gap:12px}
.main{display:flex;gap:12px;flex:1;min-height:0}
.colv{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.cols{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:14px;flex-wrap:wrap}
.hdr__l{display:flex;align-items:center;gap:14px}
.logo{width:40px;height:40px;position:relative;transform-style:preserve-3d;animation:cr 8s linear infinite;flex-shrink:0}
.logof{position:absolute;width:40px;height:40px;border:1.5px solid var(--a);border-radius:7px;opacity:.4}
.logof:nth-child(1){transform:translateZ(20px)}.logof:nth-child(2){transform:rotateY(180deg) translateZ(20px)}.logof:nth-child(3){transform:rotateY(90deg) translateZ(20px)}.logof:nth-child(4){transform:rotateY(-90deg) translateZ(20px)}.logof:nth-child(5){transform:rotateX(90deg) translateZ(20px)}.logof:nth-child(6){transform:rotateX(-90deg) translateZ(20px)}
.logoc{position:absolute;top:50%;left:50%;width:8px;height:8px;background:var(--a);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 15px var(--a)}
.htit{font-size:1.15rem;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hsub{font-size:.68rem;color:var(--t2);margin-top:1px}
.hdr__r{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.kbox{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:var(--rs);padding:0 12px;transition:all .3s}
.kbox:focus-within{border-color:rgba(var(--ar),.25)}
.kin{padding:8px 0;font-size:.76rem;font-family:var(--fm);width:200px}
.kin::placeholder{color:var(--t3)}
.ktag{font-size:.6rem;color:var(--t3);white-space:nowrap}.ktag--ok{color:var(--a)}
.ind{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:18px;background:rgba(255,255,255,.02);border:1px solid var(--brd);font-size:.7rem;font-weight:600;color:var(--t2)}
.indd{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:all .3s}
.ind--on .indd{background:var(--a);box-shadow:0 0 8px var(--a);animation:dp 2s infinite}
.ind--on{color:var(--a)}
.ind--live .indd{background:var(--d);box-shadow:0 0 8px var(--d);animation:dp 1s infinite}
.ind--live{color:var(--d)}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}

/* Video */
.vbox{position:relative;flex:1;min-height:300px;display:flex;align-items:center;justify-content:center;overflow:hidden}
#vid{width:100%;height:100%;object-fit:contain;display:block;background:#000;border-radius:var(--r)}
#cvs{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.brk{position:absolute;width:24px;height:24px;z-index:5;opacity:.2;transition:opacity .3s}
.vbox:hover .brk{opacity:.6}
.brk--tl{top:12px;left:12px;border-top:2px solid var(--a);border-left:2px solid var(--a)}
.brk--tr{top:12px;right:12px;border-top:2px solid var(--a);border-right:2px solid var(--a)}
.brk--bl{bottom:12px;left:12px;border-bottom:2px solid var(--a);border-left:2px solid var(--a)}
.brk--br{bottom:12px;right:12px;border-bottom:2px solid var(--a);border-right:2px solid var(--a)}
.sbar{position:absolute;top:0;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,var(--a),transparent);box-shadow:0 0 12px var(--a);opacity:0;pointer-events:none;z-index:6}
.sbar--on{opacity:.35;animation:sd 3s linear infinite}
@keyframes sd{to{top:100%}}
.dfl{position:absolute;inset:0;border:2px solid var(--a);border-radius:var(--r);opacity:0;pointer-events:none;z-index:7;animation:fl .5s ease-out forwards}
@keyframes fl{0%{opacity:.5}100%{opacity:0;transform:scale(1.01)}}

/* Placeholder */
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:4;background:rgba(2,5,16,.9);transition:opacity .5s,visibility .5s}
.ph--off{opacity:0;visibility:hidden;pointer-events:none}
.phv{position:relative;width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.phi{width:34px;height:34px;color:var(--a);filter:drop-shadow(0 0 12px rgba(var(--ar),.4));animation:br 3s ease-in-out infinite}
.phr{position:absolute;inset:-10px;border:1px solid rgba(var(--ar),.1);border-radius:50%;animation:rg 3s ease-in-out infinite}
.phr--2{inset:-24px;animation-delay:.4s}.phr--3{inset:-38px;animation-delay:.8s}
@keyframes br{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:1}}
@keyframes rg{0%,100%{opacity:.15}50%{opacity:.05}}
.pht{font-size:.9rem;color:var(--t2);font-weight:500}
.phs{font-size:.72rem;color:var(--t3)}

/* Source selector */
.srcbox{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
.srcrow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.srclbl{font-size:.7rem;color:var(--t2);font-weight:600;letter-spacing:.5px;margin-bottom:2px}
.srcbtn{padding:7px 14px;border-radius:var(--rs);background:rgba(255,255,255,.03);border:1px solid var(--brd);color:var(--t2);font-size:.73rem;font-weight:500;transition:all .25s;display:flex;align-items:center;gap:6px}
.srcbtn:hover{border-color:rgba(var(--ar),.2);color:var(--t1)}
.srcbtn.active{background:rgba(var(--ar),.1);border-color:rgba(var(--ar),.3);color:var(--a)}
.srcbtn svg{width:14px;height:14px;flex-shrink:0}
.srcbtn--file{position:relative;overflow:hidden}
.srcbtn--file input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.camrow{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.cambtn{padding:5px 10px;border-radius:6px;background:rgba(255,255,255,.02);border:1px solid var(--brd);color:var(--t3);font-size:.68rem;transition:all .2s;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cambtn:hover{color:var(--t1);border-color:rgba(var(--ar),.15)}
.cambtn.active{background:rgba(var(--ar),.08);border-color:rgba(var(--ar),.25);color:var(--a)}
.nocam{color:var(--d);font-size:.72rem;padding:4px 0}

/* Controls */
.cbar{display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap;border-top:1px solid var(--brd)}
.csep{width:1px;height:24px;background:var(--brd);margin:0 2px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border:1px solid var(--brd);border-radius:var(--rs);background:rgba(255,255,255,.02);font-size:.8rem;font-weight:600;transition:all .25s;user-select:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.3;pointer-events:none}
.btn svg{width:16px;height:16px;flex-shrink:0}
.btn--on{background:linear-gradient(135deg,rgba(var(--ar),.12),rgba(var(--ar),.03));border-color:rgba(var(--ar),.2);color:var(--a)}
.btn--on:hover{border-color:var(--a)}
.btn--off{background:linear-gradient(135deg,rgba(var(--dr),.1),rgba(var(--dr),.02));border-color:rgba(var(--dr),.15);color:var(--d)}
.btn--live{background:linear-gradient(135deg,rgba(var(--dr),.1),rgba(var(--dr),.02));border-color:rgba(var(--dr),.18);color:var(--d)}
.btn--live.active{animation:lg 2s ease-in-out infinite}
@keyframes lg{0%,100%{box-shadow:0 0 10px rgba(var(--dr),.1)}50%{box-shadow:0 0 24px rgba(var(--dr),.2)}}
.rdot{width:7px;height:7px;border-radius:50%;background:var(--d);flex-shrink:0}
.btn--live.active .rdot{animation:dp 1s infinite}
.btn--snap{background:linear-gradient(135deg,rgba(0,180,255,.12),rgba(0,180,255,.03));border-color:rgba(0,180,255,.2);color:var(--b)}

.ipick{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--t2)}
.ipick__b{display:flex;gap:3px}
.ipk{padding:5px 11px;border-radius:6px;background:rgba(255,255,255,.02);border:1px solid var(--brd);color:var(--t2);font-size:.72rem;font-weight:600;font-family:var(--fm);transition:all .2s}
.ipk:hover{border-color:rgba(var(--ar),.2);color:var(--t1)}
.ipk.active{background:rgba(var(--ar),.1);border-color:rgba(var(--ar),.3);color:var(--a)}

/* Panels */
.pnl{display:flex;flex-direction:column;overflow:hidden}
.pnlh{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--brd)}
.pnln{display:flex;align-items:center;gap:7px;font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:var(--t2)}
.pnln svg{width:16px;height:16px;color:var(--a)}
.bdg{background:rgba(var(--ar),.1);color:var(--a);font-size:.65rem;font-weight:700;font-family:var(--fm);padding:2px 8px;border-radius:8px}
.pnlb{padding:4px}.pnlb--s{overflow-y:auto;flex:1;min-height:0}
.pnlb--m{padding:6px 10px;font-family:var(--fm);font-size:.68rem;line-height:1.8}
#po{flex:1;min-height:0}
#pl{max-height:240px}

.emp{display:flex;flex-direction:column;align-items:center;padding:30px 8px;color:var(--t3);font-size:.78rem;gap:8px}
.emp svg{width:32px;height:32px;opacity:.25}

.oi{display:flex;align-items:center;padding:9px 10px;border-radius:var(--rs);margin-bottom:2px;background:rgba(255,255,255,.01);border:1px solid transparent;transition:all .2s;animation:os .35s both}
.oi:hover{background:rgba(var(--ar),.03);border-color:rgba(var(--ar),.06);transform:translateX(4px)}
@keyframes os{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.oib{width:3px;height:30px;border-radius:2px;background:var(--a);margin-right:10px;flex-shrink:0;box-shadow:0 0 6px rgba(var(--ar),.3)}
.oii{flex:1;min-width:0}
.oin{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oim{font-size:.65rem;color:var(--t3);margin-top:1px;display:flex;gap:8px}
.oic{font-size:.78rem;font-weight:700;color:var(--a);font-family:var(--fm);flex-shrink:0;margin-left:6px}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px}
.sc{background:rgba(255,255,255,.012);border:1px solid var(--brd);border-radius:var(--rs);padding:14px 12px;text-align:center;transition:all .3s;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--a),var(--b));opacity:.1;transition:opacity .3s}
.sc:hover{border-color:rgba(var(--ar),.15);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
.sc:hover::before{opacity:.4}
.scv{font-size:1.4rem;font-weight:800;font-family:var(--fm);color:var(--a);margin-bottom:4px}
.scl{font-size:.62rem;color:var(--t3);letter-spacing:.5px;font-weight:600;text-transform:uppercase}

.lr{display:flex;gap:6px;animation:os .2s both}
.lt{color:var(--t3);flex-shrink:0;font-size:.64rem}
.lm{word-break:break-word}
.lm--ok{color:var(--a)}.lm--err{color:var(--d)}.lm--info{color:var(--t3)}.lm--warn{color:var(--w)}

@media(max-width:900px){.main{flex-direction:column}.cols{width:100%;flex-direction:row;flex-wrap:wrap}#po{flex:1 1 100%;max-height:240px}.pnl:not(#po){flex:1 1 calc(50% - 5px);min-width:200px}#pl{max-height:180px}.hdr__r{width:100%}.kin{flex:1;width:auto;min-width:60px}.csep{display:none}.ipick{margin-left:0;width:100%;justify-content:center;margin-top:4px}}
@media(max-width:520px){.app{padding:6px}.htit{font-size:.9rem}.hsub{display:none}.pnl:not(#po){flex:1 1 100%}.btn span{display:none}.scv{font-size:1.1rem}.cb{display:none}}
</style>
</head>
<body>
<div class="bgfx"><div class="bgg"></div><div class="orb o1"></div><div class="orb o2"></div><div id="ptbox"></div></div>
<div class="s3"><div class="cb"><div class="cbf"></div><div class="cbf"></div><div class="cbf"></div><div class="cbf"></div><div class="cbf"></div><div class="cbf"></div></div></div>

<div class="app">
<header class="hdr gc">
<div class="hdr__l">
<div class="logo"><div class="logof"></div><div class="logof"></div><div class="logof"></div><div class="logof"></div><div class="logof"></div><div class="logof"></div><div class="logoc"></div></div>
<div><div class="htit">AI VISION DETECTOR</div><div class="hsub">Google Gemini — BEPUL jonli aniqlash</div></div>
</div>
<div class="hdr__r">
<div class="kbox"><input type="password" id="keyIn" class="kin" placeholder="Gemini API kaliti..." autocomplete="off"/><span class="ktag" id="ktag"></span></div>
<div style="display:flex;gap:6px">
<div class="ind" id="iCam"><span class="indd"></span><span>Kamera</span></div>
<div class="ind" id="iLive"><span class="indd"></span><span>Kutish</span></div>
</div>
</div>
</header>

<main class="main">
<section class="colv">
<div class="vbox gc" id="vbox">
<video id="vid" autoplay playsinline muted></video>
<canvas id="cvs"></canvas>
<div class="sbar" id="sbar"></div>
<div class="brk brk--tl"></div><div class="brk brk--tr"></div><div class="brk brk--bl"></div><div class="brk brk--br"></div>
<div class="ph" id="ph">
<div class="phv"><div class="phr"></div><div class="phr phr--2"></div><div class="phr phr--3"></div>
<svg class="phi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
</div>
<p class="pht">Manba tanlang</p>
<p class="phs">Kamera, fayl yuklash yoki rasm URL</p>
</div>
</div>

<div class="gc">
<div class="srcbox">
<div class="srclbl">MANBA TANLANG:</div>
<div class="srcrow">
<button class="srcbtn" id="srcCamBtn" onclick="initCamMode()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
<span>Kamera</span>
</button>
<label class="srcbtn srcbtn--file">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
<span>Fayl yuklash</span>
<input type="file" accept="image/*" capture="environment" id="fileIn"/>
</label>
<label class="srcbtn srcbtn--file">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
<span>Galereyadan</span>
<input type="file" accept="image/*" id="galIn"/>
</label>
</div>
<div class="camrow" id="camList"></div>
</div>
<div class="cbar">
<button class="btn btn--on" id="btnOn" onclick="camOn()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>Yoqish</span></button>
<button class="btn btn--off" id="btnOff" onclick="camOff()" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="6" y="6" width="12" height="12" rx="1"/></svg><span>O'chirish</span></button>
<span class="csep"></span>
<button class="btn btn--snap" id="btnSnap" onclick="snapAnalyze()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><span>Bir marta</span></button>
<span class="csep"></span>
<button class="btn btn--live" id="btnLive" onclick="toggleLive()" disabled><span class="rdot"></span><span class="blbl">Jonli</span></button>
<span class="csep"></span>
<div class="ipick">
<div class="ipick__b" id="ipb">
<button class="ipk" data-ms="1500">1.5s</button>
<button class="ipk active" data-ms="2500">2.5s</button>
<button class="ipk" data-ms="4000">4s</button>
<button class="ipk" data-ms="6000">6s</button>
</div>
</div>
</div>
</div>
</section>

<aside class="cols">
<div class="pnl gc" id="po"><div class="pnlh"><div class="pnln"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><span>ANIQLANGAN OBYEKTLAR</span></div><span class="bdg" id="ob">0</span></div><div class="pnlb pnlb--s" id="ol"><div class="emp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><p>Obyektlar yo'q</p></div></div></div>
<div class="pnl gc"><div class="pnlh"><div class="pnln"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg><span>STATISTIKA</span></div></div><div class="sg"><div class="sc"><div class="scv" id="sF">0</div><div class="scl">Kadrlar</div></div><div class="sc"><div class="scv" id="sO">0</div><div class="scl">Obyektlar</div></div><div class="sc"><div class="scv" id="sL">&mdash;</div><div class="scl">API ms</div></div><div class="sc"><div class="scv" id="sA">0</div><div class="scl">Tahlil/daq</div></div></div></div>
<div class="pnl gc" id="pl"><div class="pnlh"><div class="pnln"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="18" rx="2"/><polyline points="7 8 10.5 11.5 7 15"/><line x1="14" y1="15" x2="17" y2="15"/></svg><span>JURNAL</span></div></div><div class="pnlb pnlb--s pnlb--m" id="lb"></div></div>
</aside>
</main>
</div>

<script>
var vid=document.getElementById('vid'),cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
var ph=document.getElementById('ph'),sbar=document.getElementById('sbar'),vbox=document.getElementById('vbox');
var keyIn=document.getElementById('keyIn'),ktag=document.getElementById('ktag');
var btnOn=document.getElementById('btnOn'),btnOff=document.getElementById('btnOff'),btnLive=document.getElementById('btnLive'),btnSnap=document.getElementById('btnSnap');
var iCam=document.getElementById('iCam'),iLive=document.getElementById('iLive');
var ol=document.getElementById('ol'),ob=document.getElementById('ob'),lb=document.getElementById('lb');
var camListEl=document.getElementById('camList');
var fileIn=document.getElementById('fileIn'),galIn=document.getElementById('galIn');

var stream=null,live=false,timer=null,intv=2500,busy=false,hasKey=false;
var frames=0,lastN=0,lastMs=null,tLog=[];
var cameras=[],selCamId=null;
var imgMode=false,imgData=null;

// Particles
!function(){var b=document.getElementById('ptbox');for(var i=0;i<15;i++){var p=document.createElement('div');p.className='pt';p.style.left=Math.random()*100+'%';p.style.animationDuration=(10+Math.random()*16)+'s';p.style.animationDelay=Math.random()*10+'s';b.appendChild(p)}}();

// Init
!async function(){
  log('Tizim ishga tushdi','info');
  try{var r=await(await fetch('/api/health')).json();hasKey=!!r.hasKey;
    if(hasKey){log('Server API kaliti tayyor','ok');keyIn.placeholder='Server kaliti bor';ktag.textContent='✓';ktag.className='ktag ktag--ok'}
    else{log('API kalitni kiriting','warn');log('BEPUL: aistudio.google.com/apikey','warn')}
  }catch(e){log('Server xato','err')}
}();

// File inputs
fileIn.addEventListener('change',handleFile);
galIn.addEventListener('change',handleFile);

function handleFile(e){
  var file=e.target.files[0];if(!file)return;
  if(stream)camOff();
  imgMode=true;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      cvs.width=img.width;cvs.height=img.height;
      vid.style.display='none';
      cvs.style.position='relative';cvs.style.width='100%';cvs.style.height='100%';cvs.style.objectFit='contain';
      ctx.drawImage(img,0,0);
      imgData=cvs.toDataURL('image/jpeg',0.8).split(',')[1];
      ph.classList.add('ph--off');
      btnSnap.disabled=false;
      log('Rasm yuklandi: '+img.width+'x'+img.height,'ok');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// Camera enumerate
async function initCamMode(){
  imgMode=false;vid.style.display='block';cvs.style.position='absolute';
  log('Kameralar qidirilmoqda...','info');
  try{
    try{var ts=await navigator.mediaDevices.getUserMedia({video:true,audio:false});ts.getTracks().forEach(function(t){t.stop()})}
    catch(e){log('Kamera ruxsati: '+e.message,'err');camListEl.innerHTML='<span class="nocam">Ruxsat berilmadi. Fayl yuklang.</span>';return}
    var devs=await navigator.mediaDevices.enumerateDevices();
    cameras=devs.filter(function(d){return d.kind==='videoinput'});
    if(!cameras.length){camListEl.innerHTML='<span class="nocam">Kamera topilmadi. Yuqoridagi "Fayl yuklash" ni ishlating.</span>';log('Kamera yo\'q — fayl yuklang','warn');return}
    selCamId=cameras[0].deviceId;
    log(cameras.length+' kamera topildi','ok');
    var h='';cameras.forEach(function(c,i){
      var l=c.label||('Kamera '+(i+1));
      h+='<button class="cambtn'+(i===0?' active':'')+'" onclick="pickCam(this,\''+c.deviceId+'\')">'+esc(l)+'</button>';
    });
    camListEl.innerHTML=h;
    document.getElementById('srcCamBtn').classList.add('active');
  }catch(e){log('Xato: '+e.message,'err');camListEl.innerHTML='<span class="nocam">'+esc(e.message)+'</span>'}
}

function pickCam(el,id){
  camListEl.querySelectorAll('.cambtn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');selCamId=id;
  log('Kamera tanlandi','info');
  if(stream){camOff();setTimeout(camOn,200)}
}

// Camera on/off
async function camOn(){
  if(imgMode){log('Avval kamera rejimini tanlang','warn');return}
  if(!cameras.length){log('Kamera yo\'q! Fayl yuklang.','err');return}
  try{
    log('Ulanmoqda...','info');
    var c={video:{width:{ideal:1280},height:{ideal:720}},audio:false};
    if(selCamId)c.video.deviceId={exact:selCamId};
    try{stream=await navigator.mediaDevices.getUserMedia(c)}
    catch(e){log('Fallback sinab ko\'rilmoqda...','warn');c.video={width:{ideal:1280},height:{ideal:720}};stream=await navigator.mediaDevices.getUserMedia(c)}
    vid.srcObject=stream;
    vid.onloadedmetadata=function(){cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;log('Kamera: '+vid.videoWidth+'x'+vid.videoHeight,'ok')};
    ph.classList.add('ph--off');
    iCam.classList.add('ind--on');btnOn.disabled=true;btnOff.disabled=false;btnLive.disabled=false;btnSnap.disabled=false;
  }catch(e){
    log('Kamera xato: '+e.message,'err');
    if(e.name==='NotFoundError')log('Kamera yo\'q. Fayl yuklang!','warn');
    else if(e.name==='NotAllowedError')log('Ruxsat bering!','warn');
    else if(e.name==='NotReadableError')log('Kamera band — boshqa dasturni yoping','warn');
  }
}

function camOff(){
  if(live)toggleLive();
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  vid.srcObject=null;ctx.clearRect(0,0,cvs.width,cvs.height);
  ph.classList.remove('ph--off');sbar.classList.remove('sbar--on');
  iCam.classList.remove('ind--on');btnOn.disabled=false;btnOff.disabled=true;btnLive.disabled=true;
  renderList([]);log('O\'chirildi','info');
}

// Live toggle
function toggleLive(){
  if(!live){
    if(!hasKey&&!keyIn.value.trim()){log('API kalit kerak!','err');keyIn.focus();return}
    live=true;btnLive.classList.add('active');document.querySelector('.blbl').textContent='Stop';
    iLive.classList.add('ind--live');sbar.classList.add('sbar--on');
    log('Jonli boshlandi ('+intv+'ms)','ok');
    doAnalyze();timer=setInterval(doAnalyze,intv);
  }else{
    live=false;if(timer){clearInterval(timer);timer=null}
    btnLive.classList.remove('active');document.querySelector('.blbl').textContent='Jonli';
    iLive.classList.remove('ind--live');sbar.classList.remove('sbar--on');
    log('To\'xtatildi','info');
  }
}

// Single snap
function snapAnalyze(){
  if(busy)return;
  if(!hasKey&&!keyIn.value.trim()){log('API kalit kerak!','err');keyIn.focus();return}
  doAnalyze();
}

// Analyze
async function doAnalyze(){
  if(busy)return;busy=true;
  try{
    var b64;
    if(imgMode&&imgData){b64=imgData}
    else{
      if(!vid.videoWidth){busy=false;return}
      var w=vid.videoWidth,h=vid.videoHeight,mx=1024;
      if(Math.max(w,h)>mx){var r=mx/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r)}
      var tc=document.createElement('canvas');tc.width=w;tc.height=h;tc.getContext('2d').drawImage(vid,0,0,w,h);
      b64=tc.toDataURL('image/jpeg',0.72).split(',')[1];
    }
    if(!b64){busy=false;return}
    log('Tahlil...','info');
    var t0=performance.now();
    var hd={'Content-Type':'application/json'};var k=keyIn.value.trim();if(k)hd['X-Client-Key']=k;
    var resp=await fetch('/api/analyze',{method:'POST',headers:hd,body:JSON.stringify({image:b64})});
    var json=await resp.json();
    if(!resp.ok||!json.ok)throw new Error(json.error||'Xato '+resp.status);
    var objects=json.objects||[];
    var ms=Math.round(performance.now()-t0);
    frames++;lastN=objects.length;lastMs=ms;
    var now=Date.now();tLog.push(now);tLog=tLog.filter(function(t){return now-t<60000});
    flashFx();drawBoxes(objects);renderList(objects);
    document.getElementById('sF').textContent=frames;
    document.getElementById('sO').textContent=lastN;
    document.getElementById('sL').textContent=lastMs;
    document.getElementById('sA').textContent=tLog.length;
    log(objects.length+' obyekt ('+ms+'ms)','ok');
  }catch(e){
    log('Xato: '+e.message,'err');
    if(e.message.indexOf('429')!==-1)log('Rate limit — interval kattalashtiring','warn');
  }
  busy=false;
}

// Interval picker
document.getElementById('ipb').addEventListener('click',function(e){
  var b=e.target;if(!b.classList.contains('ipk'))return;
  document.querySelectorAll('.ipk').forEach(function(x){x.classList.remove('active')});
  b.classList.add('active');intv=parseInt(b.getAttribute('data-ms'));
  if(live){clearInterval(timer);timer=setInterval(doAnalyze,intv);log('Interval: '+intv+'ms','info')}
});

// Device change
if(navigator.mediaDevices&&navigator.mediaDevices.addEventListener){
  navigator.mediaDevices.addEventListener('devicechange',function(){log('Qurilma o\'zgardi','info');if(!imgMode)initCamMode()});
}

// Draw
function drawBoxes(objects){
  var W=cvs.width,H=cvs.height;
  if(imgMode&&imgData){
    var img=new Image();img.onload=function(){ctx.drawImage(img,0,0);drawOver(objects,W,H)};
    img.src='data:image/jpeg;base64,'+imgData;
  }else{ctx.clearRect(0,0,W,H);drawOver(objects,W,H)}
}
function drawOver(objects,W,H){
  objects.forEach(function(o){
    var x=(o.x||0)*W,y=(o.y||0)*H,w=(o.w||0)*W,h=(o.h||0)*H;
    var conf=Math.round((o.confidence||0)*100);
    var lbl=(o.labelUz||o.label||'?')+'  '+conf+'%';
    ctx.save();ctx.shadowColor='#00ff88';ctx.shadowBlur=12;ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.fillStyle='rgba(0,255,136,0.04)';
    if(o.shape==='circle'){var rx=w/2,ry=h/2;ctx.beginPath();ctx.ellipse(x+rx,y+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.fill();ctx.stroke()}
    else if(o.shape==='triangle'){ctx.beginPath();ctx.moveTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath();ctx.fill();ctx.stroke()}
    else{ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);
      var tl=Math.min(12,w*.2,h*.2);ctx.lineWidth=3;ctx.shadowBlur=16;
      ctx.beginPath();ctx.moveTo(x,y+tl);ctx.lineTo(x,y);ctx.lineTo(x+tl,y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+w-tl,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y+tl);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+h-tl);ctx.lineTo(x,y+h);ctx.lineTo(x+tl,y+h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+w-tl,y+h);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w,y+h-tl);ctx.stroke()}
    ctx.shadowBlur=0;var fs=Math.max(10,Math.min(14,W*.013));ctx.font='bold '+fs+'px Inter,sans-serif';
    var tw=ctx.measureText(lbl).width,px=7,py=3,tH=fs+py*2,tW=tw+px*2,tY=Math.max(0,y-tH-4);
    ctx.fillStyle='rgba(0,255,136,0.88)';ctx.beginPath();var rr=3;
    ctx.moveTo(x+rr,tY);ctx.lineTo(x+tW-rr,tY);ctx.arcTo(x+tW,tY,x+tW,tY+rr,rr);ctx.lineTo(x+tW,tY+tH-rr);ctx.arcTo(x+tW,tY+tH,x+tW-rr,tY+tH,rr);ctx.lineTo(x+rr,tY+tH);ctx.arcTo(x,tY+tH,x,tY+tH-rr,rr);ctx.lineTo(x,tY+rr);ctx.arcTo(x,tY,x+rr,tY,rr);ctx.closePath();ctx.fill();
    ctx.fillStyle='#000';ctx.fillText(lbl,x+px,tY+py+fs-2);ctx.restore();
  });
}

function flashFx(){var f=document.createElement('div');f.className='dfl';vbox.appendChild(f);f.onanimationend=function(){f.remove()}}

function renderList(arr){
  ob.textContent=arr.length;
  if(!arr.length){ol.innerHTML='<div class="emp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><p>Obyektlar yo\'q</p></div>';return}
  ol.innerHTML=arr.map(function(o,i){var c=Math.round((o.confidence||0)*100);return'<div class="oi" style="animation-delay:'+(i*35)+'ms"><div class="oib"></div><div class="oii"><div class="oin">'+esc(o.labelUz||o.label)+'</div><div class="oim"><span>'+esc(o.shape||'rect')+'</span><span>'+esc(o.category||'')+'</span></div></div><div class="oic">'+c+'%</div></div>'}).join('');
}

function log(m,t){
  var n=new Date(),ts=[n.getHours(),n.getMinutes(),n.getSeconds()].map(function(x){return String(x).padStart(2,'0')}).join(':');
  var r=document.createElement('div');r.className='lr';r.innerHTML='<span class="lt">'+ts+'</span><span class="lm lm--'+t+'">'+esc(m)+'</span>';
  lb.appendChild(r);lb.scrollTop=lb.scrollHeight;while(lb.children.length>80)lb.removeChild(lb.firstChild);
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

window.camOn=camOn;window.camOff=camOff;window.toggleLive=toggleLive;window.snapAnalyze=snapAnalyze;window.initCamMode=initCamMode;window.pickCam=pickCam;
</script>
</body>
</html>
